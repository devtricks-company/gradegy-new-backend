name: Deploy to Azure Web App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest  # or ubuntu-latest if your build is cross-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'        # match your app’s runtime
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build          # drop if you don’t have a build step

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: new-backend-gradegy
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
